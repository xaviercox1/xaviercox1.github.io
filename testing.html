<body class="testing-page">
  <div class="cursor-blur"></div>

  <main class="testing-shell">
    <header class="testing-header">
      <p class="line">
        <span class="hl">

      </p>

      <div class="output-controls" aria-label="Testing page output controls">

        <button class="output-button" id="output-stop-record" type="button" disabled>Stop</button>
        <label class="output-size-field">

          <input id="output-canvas-width" type="number" min="320" max="3840" step="10" value="1080" />
        </label>
        <label class="output-size-field">
          <span>H</span>
          <input id="output-canvas-height" type="number" min="320" max="3840" step="10" value="1080" />
        </label>
        <button class="output-button" id="output-apply-size" type="button">Apply Size</button>
        <span class="output-status" id="output-status" aria-live="polite"></span>

      <p class="line testing-title-line">

          class="testing-page-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="date-1-panel"

        </button>
      </p>

      <div class="testing-panel" id="date-1-panel" hidden>
        <div class="experiment-lines" data-experiment-group="date-1">

            aria-controls="text-gradient-panel"

            <span class="experiment-toggle__dot" aria-hidden="true">·</span>
            <span>Text Gradient Map</span>
            <span class="testing-page-toggle__arrow" aria-hidden="true">↓</span>
          </button>
        </p>

        <div class="date-experiment" id="text-gradient-panel" hidden>
          <section class="testing-artwork" aria-label="Text gradient map canvas artwork">
            <canvas id="text-gradient-canvas" aria-label="Double sphere text gradient map"></canvas>
          </section>
        </div>

        <p class="line experiment-line">
          <button
            class="experiment-toggle"
            type="button"

              </label>

              <label>
                <span>Contrast</span>

                <span>Dither</span>

              <label>

                <input id="pattern-count" type="range" min="6" max="16" value="14" />

              <label class="testing-toggle">
                <input id="invert" type="checkbox" />

              </label>

              <button type="button" id="export-image">Export PNG</button>
            </form>

            <div class="testing-stage">
              <canvas id="pattern-canvas" width="960" height="960" aria-label="Generated pattern image"></canvas>

          </section>
        </div>

            <div class="type-physics-stage">
              <canvas id="type-physics-canvas" aria-label="Physics based tangible text outline"></canvas>

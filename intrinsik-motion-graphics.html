<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Intrinsik - Motion Graphics — Xavier Cox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="favicon.png" />
</head>
<body>
  <div class="cursor-blur"></div>
  <div class="cursor-dot"></div>

  <header class="project-nav">
    <a href="index.html" class="reveal-right" data-delay="0" aria-label="Back">←</a>
  </header>

  <main class="project-hero intrinsik-page">
    <section class="intrinsik-portraits" aria-label="Intrinsik portrait motion graphics">
      <button
        type="button"
        class="g-tile intrinsik-portrait-card reveal"
        data-delay="240"
        data-preview-src="Content/Intrinsik/Sensor%20Systems.mp4"
        data-full-src="Content/Intrinsik/Sensor%20Systems.mp4"
        data-has-audio="auto"
        aria-label="Sensor Systems portrait motion graphic preview"
      >
        <div class="g-media intrinsik-portrait-media">
          <img
            class="g-thumb"
            src="Content/Intrinsik/Thumbnails/Sensor%20Systems.png"
            data-fallback="Content/Intrinsik/Thumbnails/Sensor%20Systems.png"
            alt="Sensor Systems"
            loading="eager"
            fetchpriority="high"
            decoding="async"
          />
          <video class="g-vid intrinsik-portrait-video" muted playsinline loop preload="none"></video>
          <span class="g-audio-hotspot" aria-hidden="true"></span>
          <span class="g-audio-icon is-muted" aria-hidden="true">
            <svg class="g-audio-icon-muted" viewBox="0 0 24 24">
              <path class="g-audio-body" d="M11 6L7.4 9H4v6h3.4L11 18V6z"></path>
              <line x1="16" y1="9" x2="21" y2="14"></line>
              <line x1="21" y1="9" x2="16" y2="14"></line>
            </svg>
            <svg class="g-audio-icon-unmuted" viewBox="0 0 24 24">
              <path class="g-audio-body" d="M11 6L7.4 9H4v6h3.4L11 18V6z"></path>
              <path d="M15.5 9.5a4 4 0 0 1 0 5"></path>
              <path d="M18.2 7.6a7 7 0 0 1 0 8.8"></path>
            </svg>
          </span>
        </div>
      </button>

      <button
        type="button"
        class="g-tile intrinsik-portrait-card reveal"
        data-delay="300"
        data-preview-src="Content/Intrinsik/Toobris.mp4"
        data-full-src="Content/Intrinsik/Toobris.mp4"
        data-has-audio="auto"
        aria-label="Toobris portrait motion graphic preview"
      >
        <div class="g-media intrinsik-portrait-media">
          <img
            class="g-thumb"
            src="Content/Intrinsik/Thumbnails/Toobris.png"
            data-fallback="Content/Intrinsik/Thumbnails/Toobris.png"
            alt="Toobris"
            loading="eager"
            fetchpriority="auto"
            decoding="async"
          />
          <video class="g-vid intrinsik-portrait-video" muted playsinline loop preload="none"></video>
          <span class="g-audio-hotspot" aria-hidden="true"></span>
          <span class="g-audio-icon is-muted" aria-hidden="true">
            <svg class="g-audio-icon-muted" viewBox="0 0 24 24">
              <path class="g-audio-body" d="M11 6L7.4 9H4v6h3.4L11 18V6z"></path>
              <line x1="16" y1="9" x2="21" y2="14"></line>
              <line x1="21" y1="9" x2="16" y2="14"></line>
            </svg>
            <svg class="g-audio-icon-unmuted" viewBox="0 0 24 24">
              <path class="g-audio-body" d="M11 6L7.4 9H4v6h3.4L11 18V6z"></path>
              <path d="M15.5 9.5a4 4 0 0 1 0 5"></path>
              <path d="M18.2 7.6a7 7 0 0 1 0 8.8"></path>
            </svg>
          </span>
        </div>
      </button>

      <button
        type="button"
        class="g-tile intrinsik-portrait-card reveal"
        data-delay="360"
        data-preview-src="Content/Intrinsik/lilac%20extended.mp4"
        data-full-src="Content/Intrinsik/lilac%20extended.mp4"
        data-has-audio="auto"
        aria-label="Lilac Extended portrait motion graphic preview"
      >
        <div class="g-media intrinsik-portrait-media">
          <img
            class="g-thumb"
            src="Content/Intrinsik/Thumbnails/Lilac.png"
            data-fallback="Content/Intrinsik/Thumbnails/Lilac.png"
            alt="Lilac Extended"
            loading="eager"
            fetchpriority="auto"
            decoding="async"
          />
          <video class="g-vid intrinsik-portrait-video" muted playsinline loop preload="none"></video>
          <span class="g-audio-hotspot" aria-hidden="true"></span>
          <span class="g-audio-icon is-muted" aria-hidden="true">
            <svg class="g-audio-icon-muted" viewBox="0 0 24 24">
              <path class="g-audio-body" d="M11 6L7.4 9H4v6h3.4L11 18V6z"></path>
              <line x1="16" y1="9" x2="21" y2="14"></line>
              <line x1="21" y1="9" x2="16" y2="14"></line>
            </svg>
            <svg class="g-audio-icon-unmuted" viewBox="0 0 24 24">
              <path class="g-audio-body" d="M11 6L7.4 9H4v6h3.4L11 18V6z"></path>
              <path d="M15.5 9.5a4 4 0 0 1 0 5"></path>
              <path d="M18.2 7.6a7 7 0 0 1 0 8.8"></path>
            </svg>
          </span>
        </div>
      </button>
    </section>

    <div class="project-meta intrinsik-meta">
      <h1 class="reveal" data-delay="420">
        <a
          href="https://www.instagram.com/intrinsikaus/"
          class="intrinsik-title-link"
          target="_blank"
          rel="noreferrer"
        >Intrinsik</a> - Motion Graphics
      </h1>
      <p class="project-subhead reveal" data-delay="480">
        After Effects · TouchDesigner
      </p>
    </div>

    <div class="project-text intrinsik-copy">
      <p class="reveal" data-delay="540">
        Generated short motion graphic content for Instagrams Reel format. Utilised TouchDesigners generative systems to create designs which move organically and unexpectedly. Edited and compiled with post effects in After Effects.
      </p>
    </div>
  </main>

  <script src="script.js"></script>
  <script src="intrinsik.js"></script>
</body>
</html>
